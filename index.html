<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Currency Exchange</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💱 Live Currency Exchange</h1>
            <p class="subtitle">Real-time exchange rates powered by Open Exchange Rates API</p>
        </header>

        <div class="exchange-box">
            <!-- Currency Input Section -->
            <div class="input-section">
                <div class="input-group">
                    <label for="amount">Amount:</label>
                    <input 
                        type="number" 
                        id="amount" 
                        placeholder="Enter amount" 
                        value="1" 
                        min="0" 
                        step="0.01"
                    >
                </div>

                <div class="currency-group">
                    <div class="currency-select">
                        <label for="fromCurrency">From:</label>
                        <select id="fromCurrency">
                            <option value="USD">USD - US Dollar</option>
                            <option value="EUR">EUR - Euro</option>
                            <option value="GBP">GBP - British Pound</option>
                            <option value="JPY">JPY - Japanese Yen</option>
                            <option value="AUD">AUD - Australian Dollar</option>
                            <option value="CAD">CAD - Canadian Dollar</option>
                            <option value="CHF">CHF - Swiss Franc</option>
                            <option value="CNY">CNY - Chinese Yuan</option>
                            <option value="INR">INR - Indian Rupee</option>
                            <option value="MXN">MXN - Mexican Peso</option>
                        </select>
                    </div>

                    <button id="swapBtn" class="swap-btn" title="Swap currencies">⇄</button>

                    <div class="currency-select">
                        <label for="toCurrency">To:</label>
                        <select id="toCurrency">
                            <option value="USD">USD - US Dollar</option>
                            <option value="EUR">EUR - Euro</option>
                            <option value="GBP">GBP - British Pound</option>
                            <option value="JPY">JPY - Japanese Yen</option>
                            <option value="AUD">AUD - Australian Dollar</option>
                            <option value="CAD">CAD - Canadian Dollar</option>
                            <option value="CHF">CHF - Swiss Franc</option>
                            <option value="CNY">CNY - Chinese Yuan</option>
                            <option value="INR">INR - Indian Rupee</option>
                            <option value="MXN">MXN - Mexican Peso</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Result Section -->
            <div class="result-section">
                <div class="result-box">
                    <p class="result-label">You get:</p>
                    <div class="result-amount">
                        <span id="convertedAmount">0.00</span>
                        <span id="convertedCurrency">EUR</span>
                    </div>
                </div>
            </div>

            <!-- Exchange Rate Info -->
            <div class="info-section">
                <p class="exchange-rate">
                    1 <span id="fromCurrencyCode">USD</span> = 
                    <span id="exchangeRate">0.85</span> <span id="toCurrencyCode">EUR</span>
                </p>
                <p class="last-update" id="lastUpdate">Last updated: Just now</p>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message"></div>

            <!-- Loading Indicator -->
            <div id="loadingIndicator" class="loading-indicator">
                <div class="spinner"></div>
                <p>Fetching exchange rates...</p>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <p>Made with ❤️ | Exchange rates update every 60 seconds</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
